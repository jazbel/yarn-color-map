<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yarn Color Map</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🧶</span>
        <span class="logo-text">Yarn Color Map</span>
      </div>
      <div class="search-wrap">
        <input
          id="search"
          type="search"
          placeholder="Search yarn name or color…"
          autocomplete="off"
        />
      </div>
      <button id="refresh-btn" class="btn-refresh" title="Re-scrape all stores">
        ↻ Refresh
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="filter-group">
        <h3>Store</h3>
        <div id="store-filters" class="chip-list"></div>
      </section>

      <section class="filter-group">
        <h3>Color Family</h3>
        <div id="family-filters" class="chip-list color-chips"></div>
      </section>

      <section class="filter-group">
        <h3>Weight</h3>
        <div id="weight-filters" class="chip-list"></div>
      </section>

      <section class="filter-group">
        <h3>Fiber</h3>
        <div id="fiber-filters" class="chip-list"></div>
      </section>

      <section class="filter-group">
        <h3>Pick a Color</h3>
        <div class="color-picker-wrap">
          <input id="color-picker" type="color" value="#6495ED" />
          <span id="picker-hex" class="picker-hex">#6495ED</span>
        </div>
        <button id="find-similar" class="btn-find">Find Similar Yarns</button>
        <button id="clear-picker" class="btn-clear-pick" style="display:none">Clear</button>
      </section>
    </aside>

    <main class="content">
      <div class="toolbar">
        <span id="count-label" class="count-label">Loading…</span>
        <div class="sort-wrap">
          <label for="sort-select">Sort:</label>
          <select id="sort-select">
            <option value="default">Default</option>
            <option value="hue">By Hue</option>
            <option value="lightness">By Lightness</option>
            <option value="name">By Name</option>
          </select>
        </div>
      </div>

      <div id="yarn-grid" class="yarn-grid"></div>

      <div id="load-more-wrap" class="load-more-wrap" style="display:none">
        <button id="load-more" class="btn-load-more">Load More</button>
      </div>

      <div id="empty-state" class="empty-state" style="display:none">
        <p>No yarns match your filters.</p>
      </div>

      <div id="error-state" class="error-state" style="display:none">
        <p>Could not load yarns. Make sure the backend is running on port 8000.</p>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Yarn detail modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <div class="modal-media"></div>
      <div class="modal-body">
        <h2 id="modal-product"></h2>
        <p id="modal-color-name" class="modal-color-name"></p>
        <div class="modal-hex-row">
          <span id="modal-hex" class="modal-hex"></span>
          <button id="modal-copy" class="btn-copy">Copy</button>
        </div>
        <div class="modal-meta">
          <span id="modal-store" class="badge"></span>
          <span id="modal-src" class="badge badge-light"></span>
          <span id="modal-fiber" class="badge badge-light"></span>
          <span id="modal-weight" class="badge badge-light"></span>
          <span id="modal-price" class="badge badge-light"></span>
        </div>
        <a id="modal-link" href="#" target="_blank" rel="noopener" class="btn-product-link">
          View Product ↗
        </a>
      </div>
    </div>
  </div>
